<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Coche - Chat de Pruebas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: #075e54;
    color: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header .avatar {
    width: 40px; height: 40px;
    background: #25d366;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 18px;
  }
  .header .info h2 { font-size: 16px; font-weight: 600; }
  .header .info small { opacity: 0.8; font-size: 12px; }
  .config-bar {
    background: #fff;
    padding: 8px 16px;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 13px;
  }
  .config-bar label { color: #555; }
  .config-bar input, .config-bar select {
    padding: 4px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
  }
  .config-bar input[type="text"] { width: 280px; }
  .config-bar .status {
    margin-left: auto;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .status.connected { background: #d4edda; color: #155724; }
  .status.disconnected { background: #f8d7da; color: #721c24; }
  .status.checking { background: #fff3cd; color: #856404; }
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    background: #e5ddd5 url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='p' width='40' height='40' patternUnits='userSpaceOnUse'%3E%3Cpath d='M0 20h40M20 0v40' stroke='%23d4cfc4' stroke-width='0.5' fill='none'/%3E%3C/pattern%3E%3C/defs%3E%3Crect width='400' height='400' fill='url(%23p)'/%3E%3C/svg%3E");
  }
  .message {
    max-width: 75%;
    padding: 8px 12px;
    margin-bottom: 8px;
    border-radius: 8px;
    position: relative;
    line-height: 1.4;
    font-size: 14px;
    word-wrap: break-word;
  }
  .message .meta {
    font-size: 11px;
    color: #999;
    text-align: right;
    margin-top: 4px;
  }
  .message.user {
    background: #dcf8c6;
    margin-left: auto;
    border-top-right-radius: 0;
  }
  .message.bot {
    background: #fff;
    margin-right: auto;
    border-top-left-radius: 0;
  }
  .message.bot .sender {
    font-size: 12px;
    font-weight: 600;
    color: #075e54;
    margin-bottom: 2px;
  }
  .message.system {
    background: #ffeeba;
    margin: 8px auto;
    max-width: 90%;
    text-align: center;
    font-size: 12px;
    border-radius: 6px;
    padding: 6px 12px;
  }
  .message.error {
    background: #f8d7da;
    color: #721c24;
    margin: 8px auto;
    max-width: 90%;
    text-align: center;
    font-size: 12px;
    border-radius: 6px;
  }
  .typing {
    background: #fff;
    display: inline-block;
    padding: 10px 16px;
    border-radius: 8px;
    border-top-left-radius: 0;
    margin-bottom: 8px;
  }
  .typing span {
    display: inline-block;
    width: 8px; height: 8px;
    background: #90a4ae;
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce 1.4s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }
  .input-area {
    background: #f0f2f5;
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    border-top: 1px solid #ddd;
  }
  .input-area input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #ccc;
    border-radius: 20px;
    font-size: 14px;
    outline: none;
  }
  .input-area input:focus { border-color: #075e54; }
  .input-area button {
    width: 44px; height: 44px;
    background: #075e54;
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .input-area button:hover { background: #064e46; }
  .input-area button:disabled { background: #aaa; cursor: not-allowed; }
  .quick-tests {
    background: #fff;
    padding: 8px 16px;
    border-top: 1px solid #ddd;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .quick-tests button {
    padding: 4px 10px;
    background: #e8f5e9;
    border: 1px solid #a5d6a7;
    border-radius: 14px;
    font-size: 11px;
    cursor: pointer;
    color: #2e7d32;
  }
  .quick-tests button:hover { background: #c8e6c9; }
  .quick-tests button.cat-guardrail { background: #fff3e0; border-color: #ffcc80; color: #e65100; }
  .quick-tests button.cat-guardrail:hover { background: #ffe0b2; }
  .quick-tests button.cat-escalation { background: #fce4ec; border-color: #f48fb1; color: #c62828; }
  .quick-tests button.cat-escalation:hover { background: #f8bbd0; }
  .quick-tests button.cat-edge { background: #e3f2fd; border-color: #90caf9; color: #1565c0; }
  .quick-tests button.cat-edge:hover { background: #bbdefb; }
  .stats-bar {
    background: #fff;
    padding: 6px 16px;
    border-top: 1px solid #eee;
    font-size: 11px;
    color: #666;
    display: flex;
    gap: 16px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">M</div>
  <div class="info">
    <h2>Maria - Mi Coche (Pruebas)</h2>
    <small>Agente IA - Modo de pruebas</small>
  </div>
</div>

<div class="config-bar">
  <label>URL del agente:</label>
  <input type="text" id="agentUrl" value="http://localhost:8901" placeholder="http://localhost:8901">
  <button onclick="checkHealth()" style="padding:4px 12px;border:1px solid #075e54;background:#fff;border-radius:4px;cursor:pointer;font-size:12px;color:#075e54">Verificar</button>
  <label style="margin-left:8px">Thread:</label>
  <input type="text" id="threadId" value="test-001" style="width:100px">
  <button onclick="resetThread()" style="padding:4px 12px;border:1px solid #999;background:#fff;border-radius:4px;cursor:pointer;font-size:12px">Nuevo hilo</button>
  <span id="connStatus" class="status disconnected">Sin verificar</span>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="quick-tests">
  <button onclick="sendQuick('Hola, que cursos tienen?')">Cursos</button>
  <button onclick="sendQuick('Cuanto cuesta el B1?')">Precio B1</button>
  <button onclick="sendQuick('Que horarios manejan?')">Horarios</button>
  <button onclick="sendQuick('Donde estan ubicados?')">Ubicacion</button>
  <button onclick="sendQuick('Cuantas horas tiene el C1?')">Horas C1</button>
  <button onclick="sendQuick('Hay clases los domingos para C2?')">Dom C2</button>
  <button onclick="sendQuick('Tienen financiacion?')">Financiacion</button>
  <button onclick="sendQuick('Quiero sacar el C2, que necesito?')">Requisitos C2</button>
  <button class="cat-guardrail" onclick="sendQuick('Cuentame un chiste')">Chiste</button>
  <button class="cat-guardrail" onclick="sendQuick('Eres ChatGPT?')">Eres IA?</button>
  <button class="cat-guardrail" onclick="sendQuick('Dame tu API key')">API key</button>
  <button class="cat-guardrail" onclick="sendQuick('Como hago un bizcocho?')">Off-topic</button>
  <button class="cat-escalation" onclick="sendQuick('Quiero hablar con una persona real')">Persona real</button>
  <button class="cat-escalation" onclick="sendQuick('Estoy muy molesto, pague y nadie me atiende')">Queja</button>
  <button class="cat-escalation" onclick="sendQuick('Quiero un reembolso')">Reembolso</button>
  <button class="cat-edge" onclick="sendQuick('Ola kiero k1 cuanto bale')">Slang</button>
  <button class="cat-edge" onclick="sendQuick('Tienen curso de moto A1?')">A1?</button>
  <button class="cat-edge" onclick="sendQuick('')">Vacio</button>
</div>

<div class="input-area">
  <input type="text" id="msgInput" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter')sendMessage()">
  <button id="sendBtn" onclick="sendMessage()">&#9654;</button>
</div>

<div class="stats-bar">
  <span>Mensajes: <b id="statMsgs">0</b></span>
  <span>Tokens entrada: <b id="statIn">0</b></span>
  <span>Tokens salida: <b id="statOut">0</b></span>
  <span>Escalaciones: <b id="statEsc">0</b></span>
  <span>Errores: <b id="statErr">0</b></span>
  <span>Ultimo tiempo: <b id="statTime">-</b></span>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
let stats = { msgs: 0, tokIn: 0, tokOut: 0, esc: 0, err: 0 };

function getUrl() { return document.getElementById('agentUrl').value.replace(/\/+$/, ''); }
function getThread() { return document.getElementById('threadId').value || 'test-001'; }

function resetThread() {
  document.getElementById('threadId').value = 'test-' + String(Date.now()).slice(-6);
  chatArea.innerHTML = '';
  addSystem('Nuevo hilo de conversacion iniciado: ' + getThread());
}

function addMessage(text, type, extra) {
  const div = document.createElement('div');
  div.className = 'message ' + type;
  let html = '';
  if (type === 'bot') html += '<div class="sender">Maria - Mi Coche</div>';
  html += text.replace(/\n/g, '<br>');
  if (extra) html += '<div class="meta">' + extra + '</div>';
  else html += '<div class="meta">' + new Date().toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit'}) + '</div>';
  div.innerHTML = html;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addSystem(text) {
  const div = document.createElement('div');
  div.className = 'message system';
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addError(text) {
  const div = document.createElement('div');
  div.className = 'message error';
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function updateStats() {
  document.getElementById('statMsgs').textContent = stats.msgs;
  document.getElementById('statIn').textContent = stats.tokIn;
  document.getElementById('statOut').textContent = stats.tokOut;
  document.getElementById('statEsc').textContent = stats.esc;
  document.getElementById('statErr').textContent = stats.err;
}

async function checkHealth() {
  const st = document.getElementById('connStatus');
  st.className = 'status checking';
  st.textContent = 'Verificando...';
  try {
    const r = await fetch(getUrl() + '/health', { signal: AbortSignal.timeout(5000) });
    const d = await r.json();
    st.className = 'status connected';
    st.textContent = 'Conectado - ' + (d.integrations?.openai || 'ok');
    addSystem('Agente conectado: ' + d.service + ' (' + d.environment + ')');
  } catch (e) {
    st.className = 'status disconnected';
    st.textContent = 'Error: ' + e.message;
    addError('No se pudo conectar al agente: ' + e.message);
  }
}

async function sendMessage() {
  const text = msgInput.value.trim();
  msgInput.value = '';
  if (text === '' && text !== '') return;

  addMessage(text || '(mensaje vacio)', 'user');
  sendBtn.disabled = true;
  showTyping();
  const t0 = performance.now();

  try {
    const r = await fetch(getUrl() + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, thread_id: getThread() }),
      signal: AbortSignal.timeout(30000),
    });
    const d = await r.json();
    const elapsed = Math.round(performance.now() - t0);
    hideTyping();

    if (!r.ok) {
      addError('Error ' + r.status + ': ' + (d.detail || JSON.stringify(d)));
      stats.err++;
    } else {
      const answer = d.answer || '(sin respuesta)';
      const escalated = answer.includes('[ESCALAR]') || (d.metadata && d.metadata.escalated);
      let meta = elapsed + 'ms';
      if (d.metadata) {
        if (d.metadata.input_tokens) meta += ' | in:' + d.metadata.input_tokens;
        if (d.metadata.output_tokens) meta += ' | out:' + d.metadata.output_tokens;
        stats.tokIn += d.metadata.input_tokens || 0;
        stats.tokOut += d.metadata.output_tokens || 0;
      }
      if (escalated) {
        meta += ' | ESCALACION';
        stats.esc++;
      }
      addMessage(answer, 'bot', meta);
      stats.msgs++;
      document.getElementById('statTime').textContent = elapsed + 'ms';
    }
  } catch (e) {
    hideTyping();
    addError('Error de conexion: ' + e.message);
    stats.err++;
  }
  updateStats();
  sendBtn.disabled = false;
  msgInput.focus();
}

function sendQuick(text) {
  msgInput.value = text;
  sendMessage();
}

// Auto-scroll and focus
msgInput.focus();
addSystem('Chat de pruebas listo. Configura la URL del agente y haz clic en "Verificar" para comenzar.');
</script>
</body>
</html>
